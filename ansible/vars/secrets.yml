---
# Secrets - À remplir avec les vraies valeurs
# 🔒 Utilisez ansible-vault pour chiffrer ce fichier en production!
# ansible-vault encrypt vars/secrets.yml

# Database Secrets
db_user: "appuser"
db_pass: "changeme"
db_host: "postgres"
db_port: 5432
db_name: "prediction_db"

# API Secrets
api_key: "your-api-key-here"
secret_key: "your-secret-key-here"

# Docker Registry
docker_registry_url: "docker.io"
docker_registry_username: "your-username"
docker_registry_password: "your-password"

# Kubernetes
k8s_api_ca: "/path/to/ca.crt"
k8s_api_token: "your-api-token"

# Monitoring
monitoring_username: "admin"
monitoring_password: "changeme"

# Slack Notifications
slack_webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
slack_channel: "#devops"
slack_username: "ansible-bot"
