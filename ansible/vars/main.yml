---
# Ansible Variables principales

app_name: "prediction-app"
app_version: "1.0.0"
environment: "development"
app_host: "localhost"
app_port: 8501

# Kubernetes
k8s_namespace: "prediction-app"
k8s_version: "1.27"

# Docker
docker_version: "24"
docker_users:
  - "{{ ansible_user }}"

# Monitoring
monitoring_enabled: true
prometheus_port: 9090

# Jenkins
jenkins_version: "2.401"
jenkins_port: 8080

# Installation flags
install_docker: true
install_kubernetes: true
install_jenkins: true
install_monitoring: false
