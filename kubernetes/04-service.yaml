apiVersion: v1
kind: Service
metadata:
  name: prediction-app
  namespace: prediction-app
  labels:
    app: prediction-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: ClusterIP
  selector:
    app: prediction-app
  ports:
  - name: http
    port: 8501
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# Service pour accès externe (NodePort - local)
apiVersion: v1
kind: Service
metadata:
  name: prediction-app-nodeport
  namespace: prediction-app
spec:
  type: NodePort
  selector:
    app: prediction-app
  ports:
  - name: http
    port: 8501
    targetPort: http
    nodePort: 30501
    protocol: TCP

---
# Service Headless pour discovery
apiVersion: v1
kind: Service
metadata:
  name: prediction-app-headless
  namespace: prediction-app
spec:
  clusterIP: None
  selector:
    app: prediction-app
  ports:
  - name: http
    port: 8501
    targetPort: http
