apiVersion: v1
kind: Namespace
metadata:
  name: prediction-app
  labels:
    name: prediction-app
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: prediction-app
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8501"
  APP_NAME: "Prediction Analytics"
  APP_VERSION: "1.0.0"
  # Database (optionnel)
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "prediction_db"
  # Monitoring
  MONITORING_ENABLED: "true"
  METRICS_PORT: "9090"
