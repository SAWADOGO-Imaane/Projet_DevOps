apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prediction-app-network-policy
  namespace: prediction-app
spec:
  podSelector:
    matchLabels:
      app: prediction-app
  
  policyTypes:
  - Ingress
  - Egress
  
  # Ingress rules
  ingress:
  # Accès depuis Nginx
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: nginx
    ports:
    - protocol: TCP
      port: 8501
  
  # Accès depuis monitoring
  - from:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090
  
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  
  # Egress rules
  egress:
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  
  # Database access
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  
  # Outbound HTTPS (pour appels API externes)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# NetworkPolicy restrictive par défaut
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: prediction-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
