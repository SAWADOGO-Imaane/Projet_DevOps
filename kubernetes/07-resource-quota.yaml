apiVersion: v1
kind: ResourceQuota
metadata:
  name: prediction-app-quota
  namespace: prediction-app
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
    pods: "20"
    persistentvolumeclaims: "10"
    services: "10"
    services.nodeports: "5
  scopeSelector:
    matchExpressions:
    - operator: In
      scopeName: PriorityClass
      values: ["high", "medium", "low"]

---
apiVersion: v1
kind: LimitRange
metadata:
  name: prediction-app-limits
  namespace: prediction-app
spec:
  limits:
  # Container limits
  - max:
      cpu: "1000m"
      memory: "512Mi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "250m"
      memory: "128Mi"
    type: Container
  
  # Pod limits
  - max:
      cpu: "2000m"
      memory: "1Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    type: Pod

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: prediction-app-pdb
  namespace: prediction-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: prediction-app
