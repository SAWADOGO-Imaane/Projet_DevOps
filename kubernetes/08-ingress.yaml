apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prediction-app-ingress
  namespace: prediction-app
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - app.local
    - api.app.local
    secretName: tls-certs
  
  rules:
  - host: app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prediction-app
            port:
              number: 8501
  
  - host: api.app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prediction-app
            port:
              number: 8501

---
# Ingress alternative sans TLS pour développement local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prediction-app-ingress-local
  namespace: prediction-app
spec:
  ingressClassName: nginx
  rules:
  - host: app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prediction-app
            port:
              number: 8501
