---
# Kubernetes Network Policies - Sécurité Réseau

# Politique par défaut: Deny All Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: kube-system
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# Politique par défaut: Deny All Egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: kube-system
spec:
  podSelector: {}
  policyTypes:
  - Egress

---
# NetworkPolicy restrictive pour l'application
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-app
  namespace: prediction-app
spec:
  podSelector:
    matchLabels:
      app: prediction-app
  policyTypes:
  - Ingress
  
  ingress:
  # Ingress Controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8501
  
  # Prometheus/Monitoring
  - from:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090
  
  # Même namespace
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8501

---
# Politique d'Egress pour l'application
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-app
  namespace: prediction-app
spec:
  podSelector:
    matchLabels:
      app: prediction-app
  policyTypes:
  - Egress
  
  egress:
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  
  # Database
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  
  # API externes (HTTPS)
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443
  
  # Même namespace
  - to:
    - podSelector: {}

---
# Policy pour database
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-app-to-db
  namespace: prediction-app
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: prediction-app
    ports:
    - protocol: TCP
      port: 5432
